<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego del Gusanito</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        h1 {
            margin-bottom: 10px;
        }

        .game-container {
            position: relative;
        }

        canvas {
            background-color: #ecf0f1;
            border: 5px solid #34495e;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #score {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #f1c40f;
        }

        .instrucciones {
            margin-top: 20px;
            font-size: 14px;
            color: #bdc3c7;
            margin-bottom: 15px;
        }

        /* Estilos para el nuevo botón */
        #btn-reiniciar {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #btn-reiniciar:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <h1>Juego del Gusanito</h1>
    <div id="score">Puntuación: 0</div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div class="instrucciones">Usa las flechas del teclado (⬅️ ⬆️ ⬇️ ➡️) para moverte.</div>
    
    <button id="btn-reiniciar" onclick="location.reload()">Reiniciar Juego</button>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Tamaño de cada cuadrito (segmento del gusano y comida)
        const box = 20;

        // Inicializamos el gusano
        let snake = [];
        snake[0] = {
            x: 9 * box,
            y: 10 * box
        };

        // Generamos la comida en una posición aleatoria
        let food = {
            x: Math.floor(Math.random() * 20) * box,
            y: Math.floor(Math.random() * 20) * box
        };

        // Variables del juego
        let score = 0;
        let d; // Dirección

        // Controlar el gusano con el teclado
        document.addEventListener("keydown", direction);

        function direction(event) {
            let key = event.keyCode;
            if (key == 37 && d != "RIGHT") {
                d = "LEFT";
            } else if (key == 38 && d != "DOWN") {
                d = "UP";
            } else if (key == 39 && d != "LEFT") {
                d = "RIGHT";
            } else if (key == 40 && d != "UP") {
                d = "DOWN";
            }
        }

        // Función para detectar colisiones con su propio cuerpo
        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) {
                    return true;
                }
            }
            return false;
        }

        // Dibujar todo en el canvas
        function draw() {
            // Limpiar el canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar el gusano
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#27ae60" : "#2ecc71"; // La cabeza es un verde más oscuro
                ctx.fillRect(snake[i].x, snake[i].y, box, box);

                ctx.strokeStyle = "#ecf0f1";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // Dibujar la comida
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x, food.y, box, box);

            // Posición actual de la cabeza
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            // Determinar hacia dónde se mueve
            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            // Si el gusano come la comida
            if (snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById("score").innerText = "Puntuación: " + score;
                // Nueva comida
                food = {
                    x: Math.floor(Math.random() * 20) * box,
                    y: Math.floor(Math.random() * 20) * box
                };
            } else {
                // Eliminar la cola si no comió
                snake.pop();
            }

            // Nueva cabeza
            let newHead = {
                x: snakeX,
                y: snakeY
            };

            // Game Over (Si choca contra las paredes o consigo mismo)
            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                // Mensaje actualizado
                setTimeout(() => alert("¡Juego Terminado! Tu puntuación final fue de: " + score + ". Presiona el botón para reiniciar."), 100);
            }

            // Añadir la nueva cabeza al array del gusano
            snake.unshift(newHead);
        }

        // Llamar a la función draw cada 100 milisegundos
        let game = setInterval(draw, 100);

    </script>
</body>
</html>
